# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "filter_sim"
description: Sort SAM/BAM/CRAM file
keywords:
  - sort
  - bam
  - sam
  - cram
components:
  - vcftools
  - bcftools/filter
  - ripgrep
input:
  - ch_vcf:
      type: file
      description: |
        Input VCF file on which to perform stepwise filtering
      pattern: "*.{vcf/vcf.gz}"
output:
  - filter_summary:
      type: file
      description: |
        Tabular data showing SNPs remaining after various filtering steps
      pattern: "*.filter"
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@mhoban"
maintainers:
  - "@mhoban"
